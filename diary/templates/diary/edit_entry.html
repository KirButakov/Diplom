{% extends 'base.html' %}
{% load i18n %}

{% block title %}{% trans "Edit Entry" %}{% endblock %}

{% block content %}
<h1 class="my-4">{% trans "Edit Entry" %}</h1>
<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">{% trans "Save" %}</button>
</form>
{% endblock %}
